  .footer-tels h4{font-family:"Hiragino Mincho ProN",serif;font-size:12px;color:#2e7344;letter-spacing:.12em;margin-bottom:8px;padding-bottom:5px;border-bottom:1px dashed rgba(46,115,68,.3);font-weight:700;margin-top:0}
  .footer-tels ul{list-style:none;padding:0;margin:0;display:grid;grid-template-columns:1fr 1fr;gap:0 18px}

  .footer-tels .fac{color:#3a3530;font-weight:600;white-space:nowrap}
  .footer-tels .tel{color:#2e7344;font-family:"Helvetica Neue",Arial,sans-serif;font-weight:700;text-decoration:none;letter-spacing:.02em;font-size:11.5px;white-space:nowrap}
  .footer-tels .tel:hover{color:#d49a4d}

  .footer-sub{grid-column:1/-1;display:flex;flex-wrap:wrap;gap:6px 18px;padding-top:14px;border-top:1px solid rgba(46,115,68,.18);font-size:11.5px}
  .footer-sub a{color:#5a564f;text-decoration:none;letter-spacing:.08em;transition:color .2s}
  .footer-sub a:hover{color:#2e7344}

  .footer-copy{grid-column:1/-1;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;padding-top:14px;border-top:1px solid rgba(46,115,68,.12);font-size:11px;color:#8a8378}
  .footer-copy .support{color:#5a564f}
  .footer-copy .support .lbl{font-family:"Helvetica Neue",Arial,sans-serif;letter-spacing:.2em;font-size:9px;background:#2e7344;color:#fff;padding:2px 8px;border-radius:999px;margin-right:8px;font-weight:700}
  .footer-copy .cr{font-family:"Hiragino Sans","Yu Gothic",sans-serif;letter-spacing:.08em}

  @media(max-width:760px){
    .site-footer{padding:28px 16px 18px}
    .footer-inner{grid-template-columns:1fr;gap:18px}
    .footer-tels ul{grid-template-columns:1fr}
    .footer-copy{flex-direction:column;align-items:flex-start;gap:6px}
  }
</style>
